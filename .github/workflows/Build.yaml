name: Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 : 정적 분석 (ktlint → detekt → lint)
  # ──────────────────────────────────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate local.properties
        run: |
          echo "$PROD_BASE_URL" >> ./local.properties
          echo "$DEV_BASE_URL"  >> ./local.properties
          echo "$TERMS_URL"     >> ./local.properties
        env:
          PROD_BASE_URL: ${{ secrets.PROD_BASE_URL }}
          DEV_BASE_URL:  ${{ secrets.DEV_BASE_URL }}
          TERMS_URL:     ${{ secrets.TERMS_URL }}

      - name: Create google-services.json
        run: |
          mkdir -p ${{ github.workspace }}/app
          SECRET='${{ secrets.GOOGLE_SERVICES_JSON }}'
          TARGET='${{ github.workspace }}/app/google-services.json'

          if ! printf '%s' "$SECRET" | jq -e . > /dev/null 2>&1; then
            echo "Invalid GOOGLE_SERVICES_JSON secret: must be raw JSON content from app/google-services.json"
            exit 1
          fi

          printf '%s' "$SECRET" > "$TARGET"
          jq -e . "$TARGET" > /dev/null

      - name: Run static analysis
        run: ./gradlew ktlintCheck detekt lintDebug --continue

      - name: Merge detekt SARIF reports
        if: always()
        run: |
          python3 - <<'EOF'
          import json, glob

          results, rules, tool = [], {}, None
          for path in sorted(glob.glob('./**/reports/detekt/detekt.sarif', recursive=True)):
              with open(path) as f:
                  data = json.load(f)
              for run in data.get('runs', []):
                  if tool is None:
                      tool = run.get('tool', {})
                  for rule in run.get('tool', {}).get('driver', {}).get('rules', []):
                      rules[rule['id']] = rule
                  results.extend(run.get('results', []))

          if tool is None:
              tool = {"driver": {"name": "detekt", "rules": []}}
          tool.setdefault('driver', {})['rules'] = list(rules.values())

          merged = {
              "version": "2.1.0",
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "runs": [{"tool": tool, "results": results}]
          }
          import os; os.makedirs('build/detekt-sarif', exist_ok=True)
          with open('build/detekt-sarif/merged.sarif', 'w') as f:
              json.dump(merged, f)
          print(f"Merged {len(results)} result(s) from {len(glob.glob('./**/reports/detekt/detekt.sarif', recursive=True))} module(s)")
          EOF

      - name: Upload detekt SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/detekt-sarif/merged.sarif
          category: detekt

      - name: Collect lint reports
        if: always()
        run: |
          mkdir -p build/lint-reports
          find . -name 'lint-results-*.html' \
            -exec cp {} build/lint-reports/ \;
          find . -name 'lint-results-*.sarif' \
            -exec cp {} build/lint-reports/ \;

      - name: Upload lint HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-html-report-debug
          path: build/lint-reports/*.html
          retention-days: 14

      - name: Upload lint SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/lint-reports
          category: lint

      # ── 실패 알림 ────────────────────────────────
      - name: Notify Slack on failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ *Static Analysis* 실패",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Repository", "value": "${{ github.repository }}", "short": true },
                  { "title": "Branch",     "value": "${{ github.ref_name }}",   "short": true },
                  { "title": "Triggered by", "value": "${{ github.actor }}",    "short": true },
                  { "title": "Run",
                    "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                    "short": false }
                ]
              }]
            }

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ Static Analysis 실패\",
                \"color\": 15158332,
                \"fields\": [
                  { \"name\": \"Repository\", \"value\": \"${{ github.repository }}\", \"inline\": true },
                  { \"name\": \"Branch\",     \"value\": \"${{ github.ref_name }}\",   \"inline\": true },
                  { \"name\": \"Run\",
                    \"value\": \"[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\" }
                ]
              }]
            }"

  # ──────────────────────────────────────────────
  # JOB 2 : Debug 빌드
  # ──────────────────────────────────────────────
  debug-build:
    name: Debug Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate local.properties
        run: |
          echo "$PROD_BASE_URL" >> ./local.properties
          echo "$DEV_BASE_URL"  >> ./local.properties
          echo "$TERMS_URL"     >> ./local.properties
        env:
          PROD_BASE_URL: ${{ secrets.PROD_BASE_URL }}
          DEV_BASE_URL:  ${{ secrets.DEV_BASE_URL }}
          TERMS_URL:     ${{ secrets.TERMS_URL }}

      - name: Create google-services.json
        run: |
          mkdir -p ${{ github.workspace }}/app
          SECRET='${{ secrets.GOOGLE_SERVICES_JSON }}'
          TARGET='${{ github.workspace }}/app/google-services.json'

          if ! printf '%s' "$SECRET" | jq -e . > /dev/null 2>&1; then
            echo "Invalid GOOGLE_SERVICES_JSON secret: must be raw JSON content from app/google-services.json"
            exit 1
          fi

          printf '%s' "$SECRET" > "$TARGET"
          jq -e . "$TARGET" > /dev/null

      # ── build-logic convention plugin 검사 ──────
      - name: Check build-logic convention plugins
        run: |
          if [ -d "build-logic" ]; then
            ./gradlew -p build-logic check
          else
            echo "build-logic 디렉토리 없음, 스킵"
          fi

      # ── Dependency Guard ─────────────────────────
      # TODO: libs.versions.toml에 dependency-guard 플러그인 추가 후 아래 주석 해제
      # - name: Check dependency guard
      #   id: dependency-guard
      #   run: ./gradlew dependencyGuard
      #   continue-on-error: true
      #
      # - name: Update dependency guard baseline
      #   if: steps.dependency-guard.outcome == 'failure'
      #   run: |
      #     ./gradlew dependencyGuardBaseline
      #     git config user.name  "github-actions[bot]"
      #     git config user.email "github-actions[bot]@users.noreply.github.com"
      #     git add "**/dependencies/*.txt"
      #     git diff --staged --quiet || \
      #       git commit -m "chore: update dependency guard baseline [skip ci]"
      #     git push

      # ── assembleDebug ────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      # ── 실패 알림 ────────────────────────────────
      - name: Notify Slack on failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ *Debug Build* 실패",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Repository", "value": "${{ github.repository }}", "short": true },
                  { "title": "Branch",     "value": "${{ github.ref_name }}",   "short": true },
                  { "title": "Triggered by", "value": "${{ github.actor }}",    "short": true },
                  { "title": "Run",
                    "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                    "short": false }
                ]
              }]
            }

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ Debug Build 실패\",
                \"color\": 15158332,
                \"fields\": [
                  { \"name\": \"Repository\", \"value\": \"${{ github.repository }}\", \"inline\": true },
                  { \"name\": \"Branch\",     \"value\": \"${{ github.ref_name }}\",   \"inline\": true },
                  { \"name\": \"Run\",
                    \"value\": \"[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\" }
                ]
              }]
            }"

  # ──────────────────────────────────────────────
  # JOB 3 : 전체 성공 알림
  # ──────────────────────────────────────────────
  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [ static-analysis, debug-build ]
    if: success()

    steps:
      - name: Notify Slack on success
        continue-on-error: true
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ *빌드 성공*",
              "attachments": [{
                "color": "good",
                "fields": [
                  { "title": "Repository", "value": "${{ github.repository }}", "short": true },
                  { "title": "Branch",     "value": "${{ github.ref_name }}",   "short": true },
                  { "title": "Triggered by", "value": "${{ github.actor }}",    "short": true },
                  { "title": "Run",
                    "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                    "short": false }
                ]
              }]
            }

      - name: Notify Discord on success
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ 빌드 성공\",
                \"color\": 3066993,
                \"fields\": [
                  { \"name\": \"Repository\", \"value\": \"${{ github.repository }}\", \"inline\": true },
                  { \"name\": \"Branch\",     \"value\": \"${{ github.ref_name }}\",   \"inline\": true },
                  { \"name\": \"Run\",
                    \"value\": \"[View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\" }
                ]
              }]
            }"
